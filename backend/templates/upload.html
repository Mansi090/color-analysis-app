<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Image</title>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
  <form action="/" method="POST" enctype="multipart/form-data" class="p-4 bg-gray-800 rounded">
    <label for="image" class="block mb-2">Upload an image:</label>
    <input type="file" name="image" id="image" class="mb-4">
    <button type="submit" class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 rounded text-white">Submit</button>
  </form>
</body>
</html>
